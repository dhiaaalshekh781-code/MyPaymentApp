name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Init Gradle and Build
        run: |
          # ننشئ ملف الإعدادات الأساسي ليتمكن Gradle من العمل
          echo "rootProject.name = 'MyPaymentApp'" > settings.gradle
          # نقوم بالبناء
          gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
