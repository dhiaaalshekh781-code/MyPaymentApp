name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Setup Android project structure
        run: |
          mkdir -p app/src/main/java/com/example/myapp
          mkdir -p app/src/main/res/layout
          
          # نقل الملفات البرمجية بدقة إلى مسار الحزمة الصحيح
          if [ -f MainActivity.kt ]; then cp MainActivity.kt app/src/main/java/com/example/myapp/; fi
          if [ -f PaymentRecord.kt ]; then cp PaymentRecord.kt app/src/main/java/com/example/myapp/; fi
          if [ -f activity_main.xml ]; then cp activity_main.xml app/src/main/res/layout/; fi
          
          # إنشاء ملف الإعدادات الجذري
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF
          
          # إنشاء ملف إعدادات التطبيق متوافق مع جافا 17
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.myapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.myapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          EOF
          
          # إنشاء المانيفست المضمون
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="MyPaymentApp" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name="com.example.myapp.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # إنشاء ملف الـ settings
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; rootProject.name = 'MyPaymentApp'; include ':app'" > settings.gradle

      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
