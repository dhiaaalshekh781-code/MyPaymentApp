plugins {
    id 'com.android.application' version '8.2.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
}

// أضف هذا الجزء في الأسفل لتعريف الإعدادات الأساسية
apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'com.example.mypaymentapp'
    compileSdk 34
    defaultConfig {
        applicationId "com.example.mypaymentapp"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}
